prometheus:
  prometheusSpec:
    retention: 12h
    thanos:
      objectStorageConfig:
        existingSecret:
          name: thanos-object-storage
          key: objstore.yml
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
          # storageClassName: gp3
