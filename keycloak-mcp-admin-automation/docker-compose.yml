services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"

# This compose file starts a local Keycloak dev server only.
# Create a demo realm and a dedicated service account before running MCP tools.
