apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpbin-v1
  namespace: istio-sample
spec:
  replicas: 2
  selector:
    matchLabels:
      app: httpbin
      version: v1
  template:
    metadata:
      labels:
        app: httpbin
        version: v1
    spec:
      containers:
        - name: httpbin
          image: docker.io/kong/httpbin:0.2.2
          ports:
            - containerPort: 80
